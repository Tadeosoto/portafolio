<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" aria-hidden="true">
  <defs>
    <clipPath id="mx-white">
      <rect x="300" y="0" width="300" height="600"/>
    </clipPath>
  </defs>
  <!-- Tricolor (misma proporción que la bandera civil) -->
  <rect width="300" height="600" fill="#006847"/>
  <rect x="300" width="300" height="600" fill="#fff"/>
  <rect x="600" width="300" height="600" fill="#ce1126"/>

  <!-- Escudo simplificado (águila / nopal / serpiente) — solo franja blanca -->
  <g clip-path="url(#mx-white)">
    <g transform="translate(450 305) scale(0.68)">
      <!-- Nopal -->
      <ellipse cx="0" cy="175" rx="52" ry="38" fill="#1f6b45" transform="rotate(-8)"/>
      <ellipse cx="-48" cy="155" rx="40" ry="32" fill="#277f52"/>
      <ellipse cx="48" cy="155" rx="40" ry="32" fill="#277f52"/>
      <ellipse cx="-35" cy="125" rx="32" ry="26" fill="#2d8f5c"/>
      <ellipse cx="35" cy="125" rx="32" ry="26" fill="#2d8f5c"/>

      <!-- Cuerpo del águila -->
      <path
        d="M 0 -120 C -35 -95 -55 -20 -45 45 C -40 85 -15 115 0 120 C 15 115 40 85 45 45 C 55 -20 35 -95 0 -120 Z"
        fill="#b9722e"
      />
      <!-- Ala izquierda -->
      <path
        d="M -25 -80 C -120 -130 -175 -40 -165 35 C -155 95 -70 110 -35 75 C -50 20 -45 -40 -25 -80 Z"
        fill="#a35f24"
      />
      <!-- Ala derecha -->
      <path
        d="M 25 -80 C 120 -130 175 -40 165 35 C 155 95 70 110 35 75 C 50 20 45 -40 25 -80 Z"
        fill="#a35f24"
      />
      <!-- Cabeza y pico -->
      <ellipse cx="0" cy="-105" rx="28" ry="32" fill="#7a4318"/>
      <path d="M -12 -125 L -35 -145 L -8 -118 Z" fill="#e8c547"/>
      <path d="M 12 -125 L 35 -145 L 8 -118 Z" fill="#e8c547"/>

      <!-- Serpiente (en el pico) -->
      <path
        d="M -15 -118 Q -55 -125 -85 -95 Q -105 -65 -95 -25 Q -88 15 -55 35"
        fill="none"
        stroke="#174a28"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <circle cx="-92" cy="-88" r="9" fill="#174a28"/>
    </g>
  </g>
</svg>
